# TEMPORARY: pointed at the working github.io URL because vomaste.cz has no
# DNS yet (see AGENTS.md / commit 760babe). get_url() emits absolute URLs
# from this value, so leaving it as vomaste.cz breaks every asset link
# (main.css 404s, etc.) while the custom domain isn't reachable. Switch back
# to "https://vomaste.cz" and restore static/CNAME together, once DNS for
# vomaste.cz actually resolves to GitHub Pages.
base_url = "https://korczis.github.io/vomaste.cz"

title = "vomaste.cz"
description = "vomaste.cz"

compile_sass = false
build_search_index = false
generate_robots_txt = true
generate_feeds = false

# minify_html = true breaks Alpine.js `:attr="..."` bindings — Zola's minifier
# strips the colon prefix. Disabled for the same reason as sites/promo and
# unable.cz.
minify_html = false
hard_link_static = false

taxonomies = []

[link_checker]
# irozhlas.cz returns 403 to Zola's link-checker user agent (bot-blocking),
# not because the article is gone — skip automated verification for it.
skip_prefixes = ["https://www.irozhlas.cz/"]

[extra]
locale = "en_US"
lang = "en"

og_image = "images/og-image.jpg"
og_image_width = 1200
og_image_height = 630
og_image_type = "image/jpeg"

seo_type = "WebPage"
og_type = "website"
publisher = "vomaste.cz"

index = true
